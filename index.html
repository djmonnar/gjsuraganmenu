  leaf:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2" style="flex-shrink:0;margin-top:2px;"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.77 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>',
  info:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
  print:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'
};
const DOW_KO = ['일','월','화','수','목','금','토'];
let activeMonthId = payload.activeMonthId || (payload.months[0] && payload.months[0].id);

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function parseDateParts(str, fallbackYear, fallbackMonth){
  const raw = String(str || '').replace(/ /g,' ').replace(/\s+/g,' ').trim();
  if(!raw) return null;
  let year = fallbackYear, month = fallbackMonth, day = null;
  let m = raw.match(/(\d{4})[.\-/년\s]+(\d{1,2})[.\-/월\s]+(\d{1,2})/);
  if(m){year=parseInt(m[1],10);month=parseInt(m[2],10);day=parseInt(m[3],10);}
  else{
    m = raw.match(/(\d{1,2})[\/\.-](\d{1,2})/);
    if(m){month=parseInt(m[1],10);day=parseInt(m[2],10);}
    else{
      m = raw.match(/(\d{1,2})월\s*(\d{1,2})일/);
      if(m){month=parseInt(m[1],10);day=parseInt(m[2],10);}
    }
  }
  if(!year || !month || !day) return null;
  const dt = new Date(year, month-1, day);
  if(dt.getFullYear() !== year || dt.getMonth() !== month-1 || dt.getDate() !== day) return null;
  return {year, month, day, date:dt};
}
function getLeadingDummies(monthObj){
  if(!monthObj.menuData.length) return 0;
  const first = parseDateParts(monthObj.menuData[0].date, monthObj.year, monthObj.month);
  if(!first) return 0;
  const day = first.date.getDay();
  if(day===0 || day===6) return 0;
  return day-1;
}
function monthShortLabel(monthObj){ return monthObj.month + '월'; }

function render(){
  const selected = payload.months.find(m => m.id === activeMonthId) || payload.months[0];
  const tabs = payload.months.length > 1
    ? '<div class="ksura-month-tabs">' + payload.months.map(month => '<button class="ksura-month-tab' + (month.id===selected.id?' on':'') + '" onclick="selectMonth(\'' + month.id + '\')">' + monthShortLabel(month) + '</button>').join('') + '</div>'
    : '';
  let cards = '';
  const sortedMenu = (selected.menuData || []).slice().sort((a,b)=>{
    const da = parseDateParts(a.date, selected.year, selected.month);
    const db = parseDateParts(b.date, selected.year, selected.month);
    if(!da && !db) return 0;
    if(!da) return 1;
    if(!db) return -1;
    return da.date - db.date;
  });
  const dummies = getLeadingDummies({year:selected.year, month:selected.month, menuData:sortedMenu});
  for(let i=0;i<dummies;i++) cards += '<div class="ksura-dummy"></div>';
  sortedMenu.forEach(day=>{
    cards += '<div class="ksura-card"><div class="ksura-card-head"><span class="ksura-date">' + escapeHtml(day.date) + '</span><div class="ksura-badge">' + IC.truck + ' ' + escapeHtml(day.arrival || '') + ' 도착</div></div><div class="ksura-card-body"><div><div class="ksura-main">' + IC.main + '<span>' + escapeHtml(day.main || '') + '</span></div><div class="ksura-menu-list"><div class="ksura-menu-item">' + IC.soup + '<div class="ksura-soup">' + escapeHtml(day.soup || '') + '</div></div><div class="ksura-menu-item">' + IC.dot + '<div class="ksura-sides">' + (day.sides || []).map(s => '<span>· ' + escapeHtml(s) + '</span>').join('') + '</div></div></div></div><div class="ksura-salad">' + IC.leaf + '<span>' + escapeHtml(day.salad || '') + '</span></div></div></div>';
  });

  const origin = (payload.sharedSettings.originItems || []).length
    ? '<div class="ksura-origin-box"><div class="ksura-origin-title">' + IC.info + ' 원산지 표기 안내</div><div class="ksura-origin-list">' + (payload.sharedSettings.originItems || []).map(o => '<div class="ksura-origin-item"><span class="ksura-origin-label">' + escapeHtml(o.label) + '</span><span>' + escapeHtml(o.value) + '</span></div>').join('') + '</div></div>'
    : '';

  const weekdayHeader = '<div class="ksura-weekdays"><div class="ksura-weekday">월</div><div class="ksura-weekday">화</div><div class="ksura-weekday">수</div><div class="ksura-weekday">목</div><div class="ksura-weekday">금</div></div>';
  document.getElementById('ksura-render-area').innerHTML =
    tabs +
    '<div class="ksura-header"><div class="ksura-info"><span style="font-weight:bold;border-bottom:2px solid #FED7AA;padding-bottom:2px;">' + escapeHtml(selected.title) + '</span> | <div class="ksura-delivery-notice">' + IC.truck + ' 오늘 조리해서 <b>내일 식탁으로</b></div><button class="ksura-print-btn" onclick="window.print()">' + IC.print + ' 인쇄하기</button></div></div>' +
    '<div class="ksura-legend"><div style="color:#5C3A21;font-weight:bold;display:flex;align-items:center;gap:6px;">' + IC.main + ' 메인요리</div><div>' + IC.soup + ' 국</div><div>' + IC.dot + ' 반찬</div><div>' + IC.leaf + ' 매일 샐러드</div></div>' +
    '<div class="ksura-grid-wrap">' + weekdayHeader + '<div class="ksura-grid">' + cards + '</div></div>' +
    origin +
    '<div class="ksura-footer">' + escapeHtml(payload.sharedSettings.footerText || '') + '<div class="ksura-line"></div><div class="ksura-tel">' + escapeHtml(payload.sharedSettings.tel || '') + '</div></div>';
}
function selectMonth(monthId){ activeMonthId = monthId; render(); }
render();
</script>
